version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cvreview
      POSTGRES_PASSWORD: cvreview_pass
      POSTGRES_DB: cvreview
    ports:
      - "5420:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6320:6379"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:8025:8025"

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9020:9000"
      - "9021:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8020:8020"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - mailpit
      - minio
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: sh -c "python3 -m alembic -c /app/alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8020 --reload"

  celery-worker:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: celery -A app.infrastructure.celery worker --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "3020:3000"
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:8020
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  uploads:
  minio-data:
